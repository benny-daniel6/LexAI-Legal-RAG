# Decoupled Architecture: ChromaDB + llama-cpp-server + FastAPI

services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8002:8000"
    volumes:
      - ./chroma_db:/chroma/chroma

  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    command: -m /models/gemma-2-2b-it-Q4_K_M.gguf --host 0.0.0.0 --port 8080 -c 4096 -t 8 --timeout 300

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - chromadb
      - llama-cpp
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - LLM_API_URL=http://llama-cpp:8080/v1
      - LLM_BACKEND=local
    restart: unless-stopped
    # If using GPU, uncomment the following section (requires Docker Compose v1.28+)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
